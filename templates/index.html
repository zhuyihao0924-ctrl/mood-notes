<style>
:root{--bg:#fff4f8;--ink:#423743;--muted:#8e7f8d;--card:rgba(255,255,255,.78);--line:rgba(105,78,100,.14);--accent:#e878ad;--accent-2:#ffbad7;--deep:#382c3c;--soft:#fff0f7;--glow:rgba(232,120,173,.25);--shadow:0 18px 48px rgba(105,64,91,.16);--r:24px;--rs:18px;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}

*{box-sizing:border-box;margin:0;padding:0}html{min-height:100%;background:var(--bg)}body{min-height:100vh;min-height:100dvh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}body::before{content:"";position:fixed;inset:0;z-index:-3;background:radial-gradient(circle at 12% 9%,var(--accent-2),transparent 28%),radial-gradient(circle at 85% 14%,var(--glow),transparent 28%),linear-gradient(180deg,var(--bg),#fff 120%)}body::after{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:.72;background-image:radial-gradient(circle, var(--glow) 0 2px, transparent 2.6px),linear-gradient(135deg,transparent 0 42%,rgba(255,255,255,.24) 42% 46%,transparent 46%);background-size:58px 58px,92px 92px;background-position:10px 18px,0 0;mask-image:linear-gradient(#000,transparent 78%)}[data-theme="night"] body::before{background:radial-gradient(circle at 50% 8%,rgba(138,75,255,.32),transparent 30%),radial-gradient(circle at 88% 25%,rgba(255,120,189,.2),transparent 24%),linear-gradient(180deg,#140b22,#211132 44%,#100918)}[data-theme="night"] body::after{opacity:.5;background-image:radial-gradient(circle,rgba(239,220,255,.22) 0 1.5px,transparent 2px),radial-gradient(circle,rgba(255,120,189,.18) 0 2px,transparent 3px);background-size:64px 64px,110px 110px}[data-theme="blue"] body::before{background:radial-gradient(circle at 18% 10%,#dff4ff,transparent 32%),radial-gradient(circle at 82% 18%,#fff4bf,transparent 25%),linear-gradient(180deg,#f7fcff,#eef9ff 48%,#fffdf3)}[data-theme="berry"] body::before{background:linear-gradient(90deg,rgba(255,150,166,.1) 1px,transparent 1px),linear-gradient(rgba(255,150,166,.1) 1px,transparent 1px),radial-gradient(circle at 16% 10%,#ffd5dd,transparent 30%),linear-gradient(180deg,#fff7f8,#ffeef1 52%,#fffaf2);background-size:26px 26px,26px 26px,auto,auto}button,input,textarea{font:inherit}button{-webkit-tap-highlight-color:transparent;cursor:pointer}.app-shell{width:min(720px,100%);margin:0 auto;padding:calc(14px + var(--safe-top)) 14px calc(68px + var(--safe-bottom))}.topbar{height:46px;display:flex;align-items:center;justify-content:space-between;gap:12px}.topbar-title{font-weight:850;font-size:18px;letter-spacing:.08em}.icon-btn{width:38px;height:38px;border:0;background:transparent;color:var(--ink);font-size:28px;line-height:1}.hero{position:relative;min-height:216px;padding:18px 4px 12px}.hero-art{position:absolute;inset:8px 0 auto auto;width:150px;height:164px;pointer-events:none}.hero-art::before{content:var(--mascot,"🦎");position:absolute;right:24px;top:22px;font-size:58px;filter:drop-shadow(0 14px 18px var(--glow))}.hero-art::after{content:var(--decor,"♡ ✦");position:absolute;right:0;top:88px;font-size:28px;color:var(--accent);opacity:.82}.eyebrow{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:6px 11px;color:var(--accent);font-size:12px;font-weight:800;box-shadow:0 8px 22px var(--glow);backdrop-filter:blur(14px)}h1{margin-top:16px;font-size:clamp(32px,9vw,48px);line-height:1.04;font-weight:900;letter-spacing:.04em;color:var(--deep)}.hero-date{margin-top:10px;color:var(--muted);letter-spacing:.22em;font-size:13px}.quote-card{margin-top:18px;width:min(100%,520px);border:1px solid var(--line);border-radius:24px;background:var(--card);box-shadow:var(--shadow);padding:16px 18px;text-align:center;color:var(--deep);font-size:17px;backdrop-filter:blur(18px)}.theme-switch{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0 14px}.theme-chip{border:1px solid var(--line);border-radius:999px;background:var(--card);color:var(--muted);padding:9px 6px;font-size:13px;font-weight:800;box-shadow:0 8px 22px rgba(0,0,0,.04)}.theme-chip.active{background:var(--deep);border-color:var(--deep);color:var(--bg)}.panel{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:18px;margin-bottom:14px}.panel-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.panel-title h2,.label{font-size:15px;font-weight:900;color:var(--deep)}.mini-btn{border:1px solid var(--line);background:rgba(255,255,255,.42);color:var(--accent);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800}.weather-main{display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center}.weather-icon{font-size:54px;filter:drop-shadow(0 12px 18px var(--glow))}.temperature{font-size:52px;line-height:1;color:var(--accent);font-weight:500}.weather-city{font-weight:850}.weather-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;color:var(--muted);font-size:13px}.weather-tip,.analysis-text{margin-top:12px;border-radius:18px;background:var(--soft);padding:12px 13px;color:var(--deep);font-size:14px}.analysis-text strong{display:block;margin-bottom:5px;color:var(--accent)}.notice{display:none;align-items:flex-start;gap:10px;padding:12px 13px;border-radius:18px;margin-bottom:14px;border:1px solid rgba(255,190,120,.35);background:rgba(255,248,235,.84);color:#9b663b;font-size:14px}.notice.show{display:flex}.mood-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0 16px}.mood-btn{aspect-ratio:1;min-height:54px;border:1.5px solid var(--line);border-radius:18px;background:rgba(255,255,255,.66);color:var(--ink);display:flex;align-items:center;justify-content:center;transition:.18s ease}.mood-btn .emoji{font-size:28px;line-height:1}.mood-btn.selected{border-color:var(--accent);background:var(--soft);box-shadow:0 0 0 4px var(--glow);transform:translateY(-2px) scale(1.02)}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.field input,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:18px;background:rgba(255,255,255,.72);color:var(--ink);outline:none;padding:13px 14px;font-size:16px}.field textarea{min-height:126px;resize:vertical}.field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--glow)}.text-row{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:12px;margin:-4px 2px 12px}.submit-btn{width:100%;min-height:49px;border:none;border-radius:18px;padding:13px 16px;background:linear-gradient(135deg,var(--deep),var(--accent));color:#fff;font-weight:900;box-shadow:0 14px 30px var(--glow)}.submit-btn:disabled{opacity:.62;cursor:not-allowed}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}.stat{border:1px solid var(--line);border-radius:18px;padding:13px 14px;background:rgba(255,255,255,.5)}.stat strong{display:block;font-size:22px;line-height:1.15;color:var(--deep)}.stat span{color:var(--muted);font-size:12px}.history-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.history-head h2{font-size:18px;font-weight:900}.refresh-btn,.filter{border:1px solid var(--line);background:rgba(255,255,255,.62);color:var(--muted);border-radius:999px;padding:7px 12px;font-size:13px}.refresh-btn{color:var(--deep);font-weight:800}.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}.filter.active{color:var(--bg);background:var(--deep);border-color:var(--deep)}.history-list{display:flex;flex-direction:column;gap:12px}.note{border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.68);padding:15px;box-shadow:0 10px 24px rgba(0,0,0,.06)}[data-theme="night"] .note,[data-theme="night"] .field input,[data-theme="night"] .field textarea,[data-theme="night"] .mood-btn{background:rgba(255,255,255,.06)}.note-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px}.mood-tags,.tag-row,.reaction-row{display:flex;gap:6px;flex-wrap:wrap}.mood-tag,.tag{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 10px;font-size:12px;background:var(--soft);color:var(--accent);font-weight:800}.time{flex-shrink:0;color:var(--muted);font-size:12px}.meta{color:var(--muted);font-size:12px;margin-bottom:6px}.note-text{white-space:pre-wrap;word-break:break-word;font-size:15px}.tag-row{margin-top:10px}.tag{background:rgba(158,211,255,.2)}.reaction-row{border-top:1px dashed var(--line);margin-top:12px;padding-top:12px}.reaction-btn{min-height:36px;border:1px solid var(--line);background:var(--soft);color:var(--accent);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800}.delete-btn{display:block;margin:10px 0 0 auto;border:none;background:transparent;color:var(--muted);font-size:12px;padding:4px 8px}.empty{text-align:center;color:var(--muted);padding:34px 12px}.toast,.loading,.login-overlay,.splash{position:fixed;z-index:20}.toast{left:50%;bottom:calc(24px + var(--safe-bottom));transform:translateX(-50%) translateY(20px);background:rgba(48,40,58,.94);color:#fff;padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:.22s ease;white-space:nowrap;font-size:14px}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.loading{inset:0;display:none;place-items:center;background:rgba(255,244,248,.76);color:var(--muted);backdrop-filter:blur(8px)}.loading.show{display:grid}.login-overlay{inset:0;display:none;align-items:center;justify-content:center;background:var(--bg);padding:calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bottom))}.login-overlay.show{display:flex}.login-card{width:min(370px,100%);background:var(--card);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:28px;text-align:center}.login-card .icon{font-size:48px;margin-bottom:8px}.login-card h2{font-size:21px;margin-bottom:8px}.login-card p{color:var(--muted);font-size:13px;margin-bottom:16px}.login-card input{text-align:center;letter-spacing:3px;margin-bottom:10px}.splash{inset:0;display:grid;place-items:center;background:var(--bg);transition:.38s ease}.splash.hide{opacity:0;visibility:hidden}.splash-card{text-align:center}.splash-card img{width:138px;height:138px;border-radius:34px;box-shadow:0 18px 42px var(--glow)}.splash-card strong{display:block;margin-top:16px;font-size:22px}.splash-card span{display:block;margin-top:4px;color:var(--muted);font-size:13px}@media(display-mode:standalone){body{overscroll-behavior-y:none}.app-shell{padding-top:calc(10px + var(--safe-top))}}@media(max-width:620px){.app-shell{padding-left:12px;padding-right:12px}.hero{min-height:210px}.hero-art{width:120px;height:140px}.hero-art::before{right:14px;font-size:50px}.hero-copy{padding-right:96px}.quote-card{text-align:left}.panel{padding:15px}.mood-grid{grid-template-columns:repeat(4,1fr);gap:7px}.mood-btn{min-height:58px}.form-grid,.stats{grid-template-columns:1fr}.reaction-btn{flex:1 1 calc(33.333% - 6px);padding-left:6px;padding-right:6px}.weather-main{grid-template-columns:auto 1fr}.temperature{font-size:46px}.toast{max-width:calc(100vw - 28px);white-space:normal;text-align:center}}@media(max-width:360px){h1{font-size:29px}.hero-copy{padding-right:82px}.mood-btn{min-height:52px}.reaction-btn{font-size:11px}}

<body>
<div class="splash" id="splash"><div class="splash-card"><img src="/static/icon.svg" alt="小蜥蜴日常"><strong>小蜥蜴日常</strong><span>今天也会认真听你说</span></div></div>
<div class="login-overlay" id="loginOverlay"><div class="login-card"><div class="icon">🔐</div><h2>请输入密码</h2><p>这是我们的小小心情空间</p><div class="field"><input type="password" id="passwordInput" placeholder="密码" maxlength="40" autocomplete="off"></div><button class="submit-btn" onclick="doLogin()">进入</button></div></div>
<div class="loading" id="loading">正在加载心情记录...</div><div class="toast" id="toast"></div>
<main class="app-shell">
  <div class="topbar"><button class="icon-btn" type="button" aria-label="关闭">×</button><div class="topbar-title">小蜥蜴日常</div><button class="icon-btn" type="button" aria-label="更多">···</button></div>
  <header class="hero"><div class="hero-art" aria-hidden="true"></div><span class="eyebrow">🦎 私密心情屋</span><h1>小蜥蜴日常</h1><div class="hero-date" id="todayDate">2026-05-25</div><div class="quote-card">“ 心存温柔，山河浪漫。 ”</div></header>
  <div class="theme-switch" id="themeSwitch"></div>
  <section class="panel weather-panel"><div class="panel-title"><h2>今日天气</h2><button class="mini-btn" onclick="useCurrentLocation()">使用当前位置</button></div><div class="weather-main"><div class="weather-icon" id="weatherIcon">☁️</div><div><div class="weather-city" id="weatherCity">厦门海沧</div><div class="temperature"><span id="weatherTemp">--</span>°C</div><div class="weather-meta"><span id="weatherText">加载中</span><span id="weatherRange">-- / --</span><span id="weatherHumidity">湿度 --</span><span id="weatherWind">风力 --</span></div></div></div><div class="weather-tip" id="weatherTip">正在看看今天适合怎么照顾自己...</div></section>
  <section class="panel analysis-panel"><div class="panel-title"><h2>小蜥蜴智能分析</h2><button class="mini-btn" onclick="loadAnalysis()">更新分析</button></div><div class="analysis-text"><strong id="analysisSummary">正在整理最近的心情...</strong><span id="analysisSuggestion">如果暂时没有 AI Key，小蜥蜴会先用本地规则陪你分析。</span></div></section>
  <section class="panel"><div class="notice" id="notice"><span>💛</span><span id="noticeText"></span></div><div class="label">🌈 今天的心情是</div><div class="mood-grid" id="moodGrid"></div><div class="form-grid"><label class="field"><input id="senderInput" maxlength="20" placeholder="你的名字"></label><label class="field"><input id="tagsInput" maxlength="120" placeholder="标签，用逗号分开"></label></div><label class="field"><textarea id="noteText" maxlength="500" placeholder="写下今天想说的话..."></textarea></label><div class="text-row"><span>最多选择 3 种心情</span><span id="counter">0/500</span></div><button class="submit-btn" id="submitBtn" onclick="submitMood()">悄悄告诉小蜥蜴</button></section>
  <section class="panel"><div class="stats"><div class="stat"><strong id="totalCount">0</strong><span>条心情记录</span></div><div class="stat"><strong id="latestTime">暂无</strong><span>最近更新</span></div></div><div class="history-head"><h2>📖 心情记录</h2><button class="refresh-btn" onclick="refreshNotes()">刷新</button></div><div class="filters" id="filters"></div><div class="history-list" id="historyList"></div></section>
</main>
<script>
const NEEDS_PASSWORD = {{ needs_password | tojson }};
const TEXT_MOODS = [{name:'开心',emoji:'😊'},{name:'难过',emoji:'😢'},{name:'生气',emoji:'😠'},{name:'委屈',emoji:'🥺'},{name:'想你',emoji:'💕'},{name:'需要安慰',emoji:'🤗'},{name:'想一个人静静',emoji:'🌙'}];
const EMOJI_MOODS = ['😋','🥲','🥹','🧐','🤓','😜','😝','😞','😟','😣','😖','☹️','😓','😱','😨','😰'].map(value=>({name:value,emoji:value}));
const MOODS = [...TEXT_MOODS,...EMOJI_MOODS];
const REACTIONS = [{name:'抱抱你',emoji:'🤗'},{name:'收到啦',emoji:'💌'},{name:'想你了',emoji:'💕'}];
const THEMES = [{id:'milk',name:'奶粉',mascot:'🐰',decor:'♡ ✦'},{id:'night',name:'夜紫',mascot:'😈',decor:'✧ ♡'},{id:'blue',name:'云蓝',mascot:'☁️',decor:'☁︎ ✦'},{id:'berry',name:'草莓',mascot:'🍓',decor:'♡ 🦎'}];
let authPassword = NEEDS_PASSWORD ? '' : null;
let selectedMoods = [];
let notes = [];
let currentFilter = 'all';
let toastTimer = null;
let reactingId = null;
const $ = id => document.getElementById(id);
const moodGrid=$('moodGrid'), filters=$('filters'), historyList=$('historyList'), loading=$('loading'), toast=$('toast'), notice=$('notice'), noticeText=$('noticeText'), noteText=$('noteText'), submitBtn=$('submitBtn'), senderInput=$('senderInput'), tagsInput=$('tagsInput'), counter=$('counter');
function headers(){const value={'Content-Type':'application/json'};if(authPassword)value['X-Mood-Password']=authPassword;return value}
function showToast(message){clearTimeout(toastTimer);toast.textContent=message;toast.classList.add('show');toastTimer=setTimeout(()=>toast.classList.remove('show'),2200)}
function escapeHtml(value){const div=document.createElement('div');div.textContent=value||'';return div.innerHTML}
function moodInfo(name){return MOODS.find(m=>m.name===name)||{name,emoji:name}}
function shortMoodName(name){return name==='想一个人静静'?'想静静':name}
function moodDisplay(name){const info=moodInfo(name);return TEXT_MOODS.some(m=>m.name===name)?`${info.emoji} ${escapeHtml(name)}`:escapeHtml(name)}
function defaultReactions(){return Object.fromEntries(REACTIONS.map(reaction=>[reaction.name,0]))}
function noteReactions(note){return {...defaultReactions(),...(note.reactions||{})}}
function formatTime(iso){if(!iso)return'暂无';const date=new Date(iso);if(Number.isNaN(date.getTime()))return'刚刚';const now=new Date();const pad=n=>String(n).padStart(2,'0');const time=`${pad(date.getHours())}:${pad(date.getMinutes())}`;const sameDay=date.getFullYear()===now.getFullYear()&&date.getMonth()===now.getMonth()&&date.getDate()===now.getDate();if(sameDay)return`今天 ${time}`;const yesterday=new Date(now);yesterday.setDate(now.getDate()-1);const isYesterday=date.getFullYear()===yesterday.getFullYear()&&date.getMonth()===yesterday.getMonth()&&date.getDate()===yesterday.getDate();if(isYesterday)return`昨天 ${time}`;return`${date.getFullYear()}/${pad(date.getMonth()+1)}/${pad(date.getDate())} ${time}`}
function renderMoodButtons(){moodGrid.innerHTML=MOODS.map(mood=>`<button class="mood-btn" type="button" data-mood="${mood.name}" title="${mood.name}" aria-label="${mood.name}"><span class="emoji">${mood.emoji}</span></button>`).join('')}
function renderFilters(){filters.innerHTML=[`<button class="filter ${currentFilter==='all'?'active':''}" data-filter="all">全部</button>`,...TEXT_MOODS.map(mood=>`<button class="filter ${currentFilter===mood.name?'active':''}" data-filter="${mood.name}">${mood.emoji} ${shortMoodName(mood.name)}</button>`)].join('')}
function renderThemes(){const current=localStorage.getItem('moodTheme')||'milk';document.documentElement.dataset.theme=current;const theme=THEMES.find(item=>item.id===current)||THEMES[0];document.documentElement.style.setProperty('--mascot',`"${theme.mascot}"`);document.documentElement.style.setProperty('--decor',`"${theme.decor}"`);$('themeSwitch').innerHTML=THEMES.map(item=>`<button class="theme-chip ${item.id===current?'active':''}" data-theme="${item.id}">${item.name}</button>`).join('')}
function updateToday(){const now=new Date();const pad=n=>String(n).padStart(2,'0');$('todayDate').textContent=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`}
function updateNotice(){const reminders={'生气':'他今天可能需要你多一点耐心和温柔。','委屈':'他心里可能有一点小委屈，记得抱抱他。','难过':'他今天心情不太好，一句温暖的话会很有用。','需要安慰':'他正在认真发出需要被靠近的信号。','😞':'他今天可能有点低落，轻轻陪一下就很好。','😟':'他好像有点担心，记得告诉他你在。','😣':'他可能撑得有点辛苦，给他一点软软的安慰。','😖':'他今天可能不太舒服，别让他一个人扛。','☹️':'他看起来需要一点点阳光和抱抱。','😓':'他可能有点累了，陪他慢慢缓一缓。','😱':'他可能被吓到了，先让他安心下来。','😨':'他可能有些害怕，温柔地靠近他。','😰':'他可能很紧张，告诉他慢慢来就好。'};const message=selectedMoods.map(m=>reminders[m]).find(Boolean);if(!message){notice.classList.remove('show');return}noticeText.textContent=message;notice.classList.add('show')}
function clearForm(){selectedMoods=[];noteText.value='';tagsInput.value='';document.querySelectorAll('.mood-btn').forEach(btn=>btn.classList.remove('selected'));counter.textContent='0/500';updateNotice()}
async function loadWeather(query='city=厦门海沧'){try{const res=await fetch(`/api/weather?${query}`);const data=await res.json();$('weatherIcon').textContent=data.emoji||'🌤️';$('weatherCity').textContent=data.city||'厦门海沧';$('weatherTemp').textContent=data.temperature ?? '--';$('weatherText').textContent=data.weather||'暂不可用';$('weatherRange').textContent=(data.today_high!=null&&data.today_low!=null)?`↑${data.today_high}° ↓${data.today_low}°`:'-- / --';$('weatherHumidity').textContent=data.humidity!=null?`湿度 ${data.humidity}%`:'湿度 --';$('weatherWind').textContent=data.wind_level!=null?`风力 ${data.wind_level}级`:'风力 --';$('weatherTip').textContent=data.reminder||'今天也要好好照顾自己。'}catch(error){$('weatherTip').textContent='天气暂时没有取到，出门前再看一眼窗外。'}}
function useCurrentLocation(){if(!navigator.geolocation){showToast('这个设备暂时不支持定位');return}showToast('正在请求定位...');navigator.geolocation.getCurrentPosition(pos=>{const {latitude,longitude}=pos.coords;loadWeather(`lat=${latitude}&lon=${longitude}`);showToast('已切换到当前位置天气')},()=>{showToast('定位被拒绝，继续显示厦门海沧');loadWeather()}, {enableHighAccuracy:false,timeout:9000,maximumAge:900000})}
async function loadAnalysis(){if(NEEDS_PASSWORD&&!authPassword){$('analysisSummary').textContent='输入密码后显示智能分析';$('analysisSuggestion').textContent='小蜥蜴会根据你的最近记录生成提醒。';return}try{const res=await fetch('/api/analysis',{headers:headers()});const data=await res.json();if(!res.ok)throw new Error('analysis failed');$('analysisSummary').textContent=data.summary||'小蜥蜴看见了你最近的心情。';$('analysisSuggestion').textContent=data.suggestion||'先照顾好今天的自己。'}catch(error){$('analysisSummary').textContent='暂时没有取到分析';$('analysisSuggestion').textContent='记录功能仍然正常，稍后再刷新看看。'}}
async function fetchNotes(){loading.classList.add('show');try{const res=await fetch('/api/notes',{headers:headers()});if(!res.ok)throw new Error('load failed');const data=await res.json();notes=Array.isArray(data)?data:[];renderHistory();loadAnalysis()}catch(error){notes=[];renderHistory();showToast('加载失败，请稍后再试')}finally{loading.classList.remove('show')}}
async function refreshNotes(){await fetchNotes();showToast('已刷新')}
async function submitMood(){const text=noteText.value.trim();if(!selectedMoods.length)return showToast('请先选择心情');if(!text)return showToast('写几句话再发送吧');submitBtn.disabled=true;submitBtn.textContent='正在发送...';try{const res=await fetch('/api/notes',{method:'POST',headers:headers(),body:JSON.stringify({mood:selectedMoods.join(','),text,sender:senderInput.value.trim(),tags:tagsInput.value.trim()})});const payload=await res.json().catch(()=>({}));if(!res.ok){showToast(payload.error||'发送失败');return}showToast(res.status===202?'已临时保存，请检查存储配置':'小蜥蜴收到啦');clearForm();await fetchNotes()}catch(error){showToast('网络出错了')}finally{submitBtn.disabled=false;submitBtn.textContent='悄悄告诉小蜥蜴'}}
async function addReaction(id,reaction){reactingId=`${id}:${reaction}`;renderHistory();try{const res=await fetch(`/api/notes/${id}/reactions`,{method:'POST',headers:headers(),body:JSON.stringify({reaction})});const payload=await res.json().catch(()=>({}));if(!res.ok){showToast(payload.error||'回应失败');return}notes=notes.map(note=>note.id===id?payload.note:note);renderHistory();showToast('回应已送达')}catch(error){showToast('回应失败，请稍后再试')}finally{reactingId=null;renderHistory()}}
async function deleteNote(id){if(!confirm('确定删除这条记录吗？'))return;try{const res=await fetch(`/api/notes/${id}`,{method:'DELETE',headers:headers()});if(!res.ok)throw new Error('delete failed');notes=notes.filter(note=>note.id!==id);renderHistory();loadAnalysis();showToast('已删除')}catch(error){showToast('删除失败')}}
async function doLogin(){const password=$('passwordInput').value.trim();if(!password)return;try{const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});if(!res.ok){showToast('密码不正确');return}authPassword=password;$('loginOverlay').classList.remove('show');await fetchNotes()}catch(error){showToast('验证失败')}}
function renderHistory(){const filtered=currentFilter==='all'?notes:notes.filter(note=>String(note.mood||'').split('+').includes(currentFilter));$('totalCount').textContent=notes.length;$('latestTime').textContent=notes.length?formatTime(notes[0].time):'暂无';if(!filtered.length){historyList.innerHTML='<div class="empty">还没有记录，写下今天的心情吧。</div>';return}historyList.innerHTML=filtered.map(note=>{const moodTags=String(note.mood||'').split('+').filter(Boolean).map(name=>`<span class="mood-tag">${moodDisplay(name)}</span>`).join('');const tags=Array.isArray(note.tags)?note.tags:[];const tagHtml=tags.length?`<div class="tag-row">${tags.map(tag=>`<span class="tag">#${escapeHtml(tag)}</span>`).join('')}</div>`:'';const reactions=noteReactions(note);const reactionHtml=`<div class="reaction-row">${REACTIONS.map(item=>{const key=`${note.id}:${item.name}`;return`<button class="reaction-btn" onclick="addReaction(${Number(note.id)}, '${item.name}')" ${reactingId===key?'disabled':''}>${item.emoji} ${item.name} ${Number(reactions[item.name]||0)}</button>`}).join('')}</div>`;return`<article class="note"><div class="note-top"><div class="mood-tags">${moodTags}</div><span class="time">${formatTime(note.time)}</span></div><div class="meta">来自 ${escapeHtml(note.sender||'匿名')}</div><div class="note-text">${escapeHtml(note.text)}</div>${tagHtml}${reactionHtml}<button class="delete-btn" onclick="deleteNote(${Number(note.id)})">删除</button></article>`}).join('')}
moodGrid.addEventListener('click',event=>{const button=event.target.closest('.mood-btn');if(!button)return;const mood=button.dataset.mood;if(selectedMoods.includes(mood)){selectedMoods=selectedMoods.filter(item=>item!==mood);button.classList.remove('selected')}else{if(selectedMoods.length>=3){showToast('一次最多选择 3 种心情');return}selectedMoods.push(mood);button.classList.add('selected')}updateNotice()});
filters.addEventListener('click',event=>{const button=event.target.closest('.filter');if(!button)return;currentFilter=button.dataset.filter;renderFilters();renderHistory()});
$('themeSwitch').addEventListener('click',event=>{const button=event.target.closest('.theme-chip');if(!button)return;localStorage.setItem('moodTheme',button.dataset.theme);renderThemes()});
noteText.addEventListener('input',()=>{counter.textContent=`${noteText.value.length}/500`});
$('passwordInput').addEventListener('keydown',event=>{if(event.key==='Enter')doLogin()});
window.addEventListener('load',()=>{setTimeout(()=>$('splash').classList.add('hide'),650)});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}))}
updateToday();renderThemes();renderMoodButtons();renderFilters();loadWeather();if(NEEDS_PASSWORD){$('loginOverlay').classList.add('show');loadAnalysis()}else{fetchNotes()}
</script>
</body>
</html>
