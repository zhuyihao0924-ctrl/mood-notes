<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fff4f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小蜥蜴">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="/static/icon.svg" type="image/svg+xml">

<title>小蜥蜴心情屋</title>
<style>
:root{--bg:#fff4f8;--ink:#413746;--muted:#8b7d8b;--card:rgba(255,255,255,.78);--line:rgba(112,82,105,.14);--pink:#ec79ad;--pink2:#ffb7d4;--mint:#8fd79b;--sky:#9ed3ff;--violet:#b9a5ff;--black:#30283a;--cream:#fffaf3;--shadow:0 18px 46px rgba(98,62,86,.16);--r:22px;--rs:16px;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}*{box-sizing:border-box;margin:0;padding:0}html{min-height:100%;background:var(--bg)}body{min-height:100vh;min-height:100dvh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:radial-gradient(circle at 12% 8%,rgba(255,190,218,.72),transparent 30%),radial-gradient(circle at 86% 2%,rgba(185,165,255,.35),transparent 27%),radial-gradient(circle at 88% 30%,rgba(158,211,255,.4),transparent 24%),linear-gradient(180deg,#fff9fc 0%,#fff1f7 48%,#f5fbff 100%);line-height:1.62;overflow-x:hidden;-webkit-font-smoothing:antialiased}body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(236,121,173,.18) 0 2px,transparent 2.5px),radial-gradient(circle,rgba(48,40,58,.12) 0 1.5px,transparent 2px);background-size:54px 54px,78px 78px;background-position:8px 12px,30px 36px;mask-image:linear-gradient(#000,transparent 70%)}button,input,textarea{font:inherit}button{-webkit-tap-highlight-color:transparent}.app-shell{width:min(720px,100%);margin:0 auto;padding:calc(18px + var(--safe-top)) 16px calc(64px + var(--safe-bottom))}.hero{position:relative;min-height:232px;padding:20px 4px 18px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}.hero-copy{min-width:0}.eyebrow{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(236,121,173,.18);background:rgba(255,255,255,.72);border-radius:999px;padding:6px 11px;color:#b45d85;font-size:12px;font-weight:700;box-shadow:0 8px 22px rgba(236,121,173,.12)}h1{margin-top:12px;font-size:clamp(28px,8vw,42px);line-height:1.08;font-weight:850;letter-spacing:0;color:#392f3e}.subtitle{margin-top:12px;max-width:390px;color:var(--muted);font-size:14px}.mascot-card{position:relative;width:150px;height:176px;display:grid;place-items:end center}.mascot-card::before{content:"";position:absolute;inset:24px 2px 0;border-radius:42px;background:linear-gradient(145deg,rgba(255,255,255,.92),rgba(255,232,242,.88));box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.7)}.ear{position:absolute;top:24px;width:56px;height:56px;background:var(--black);border-radius:18px 38px 24px 38px}.ear.left{left:14px;transform:rotate(-18deg)}.ear.right{right:14px;transform:scaleX(-1) rotate(-18deg)}.bow{position:absolute;top:12px;left:50%;width:86px;height:52px;transform:translateX(-50%);z-index:2}.bow::before,.bow::after{content:"";position:absolute;top:8px;width:42px;height:34px;background:var(--pink);border-radius:14px 20px 18px 20px}.bow::before{left:0;transform:rotate(-18deg)}.bow::after{right:0;transform:rotate(18deg)}.bow i{position:absolute;left:32px;top:14px;width:22px;height:22px;border-radius:50%;background:#ffc4dc;z-index:1}.face{position:relative;z-index:1;width:118px;height:104px;margin-bottom:18px;background:#fff;border-radius:45% 45% 42% 42%;box-shadow:inset 0 -8px 0 rgba(255,232,242,.85)}.face::before,.face::after{content:"";position:absolute;top:46px;width:18px;height:22px;border-radius:50%;background:var(--black);box-shadow:0 0 0 5px rgba(255,255,255,.7) inset}.face::before{left:30px}.face::after{right:30px}.smile{position:absolute;left:50%;top:70px;width:32px;height:16px;transform:translateX(-50%);border-bottom:5px solid var(--pink);border-radius:0 0 999px 999px}.lizard-tail{position:absolute;right:10px;bottom:24px;width:58px;height:74px;border:12px solid var(--mint);border-left:none;border-bottom:none;border-radius:0 48px 0 0;transform:rotate(10deg);z-index:0}.star{position:absolute;font-size:18px;animation:twinkle 2.7s ease-in-out infinite}.star.s1{left:4px;bottom:36px}.star.s2{right:0;top:66px;animation-delay:.7s}.star.s3{left:20px;top:84px;animation-delay:1.2s}@keyframes twinkle{0%,100%{transform:scale(.9);opacity:.55}50%{transform:scale(1.15);opacity:1}}.panel{position:relative;background:var(--card);border:1px solid rgba(255,255,255,.76);border-radius:var(--r);box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:18px;margin-bottom:16px}.panel::after{content:"";position:absolute;inset:1px;border-radius:calc(var(--r) - 1px);pointer-events:none;border:1px solid rgba(255,255,255,.58)}.label{display:flex;align-items:center;gap:8px;color:#7f6f80;font-size:14px;font-weight:800;margin-bottom:12px}.mood-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}.mood-btn{aspect-ratio:1;min-height:54px;border:1.5px solid rgba(112,82,105,.14);border-radius:18px;background:linear-gradient(180deg,#fff,#fff8fb);color:var(--ink);display:flex;align-items:center;justify-content:center;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease,background .18s ease}.mood-btn .emoji{font-size:28px;line-height:1}.mood-btn:hover{border-color:rgba(236,121,173,.5);background:#fff3f9}.mood-btn.selected{border-color:var(--pink);background:linear-gradient(180deg,#fff1f7,#ffe3ef);box-shadow:0 0 0 4px rgba(236,121,173,.15);transform:translateY(-2px) scale(1.02)}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.field input,.field textarea{width:100%;border:1.5px solid rgba(112,82,105,.16);border-radius:18px;background:rgba(255,255,255,.86);color:var(--ink);outline:none;padding:13px 14px;font-size:16px;transition:border-color .18s ease,box-shadow .18s ease,background .18s ease}.field textarea{min-height:124px;resize:vertical}.field input:focus,.field textarea:focus{border-color:var(--pink);background:#fff;box-shadow:0 0 0 4px rgba(236,121,173,.12)}.text-row{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:12px;margin:-4px 2px 12px}.submit-btn{width:100%;min-height:48px;border:none;border-radius:18px;padding:13px 16px;background:linear-gradient(135deg,#30283a 0%,#e878ad 54%,#ffb7d4 100%);color:#fff;font-weight:850;box-shadow:0 14px 28px rgba(232,120,173,.26);transition:transform .18s ease,opacity .18s ease}.submit-btn:hover:not(:disabled){transform:translateY(-1px)}.submit-btn:disabled{opacity:.62;cursor:not-allowed}.notice{display:none;align-items:flex-start;gap:10px;padding:13px 14px;border-radius:18px;margin-bottom:14px;border:1px solid rgba(255,190,120,.35);background:rgba(255,248,235,.86);color:#9b663b;font-size:14px}.notice.show{display:flex}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}.stat{border:1px solid rgba(112,82,105,.12);border-radius:18px;padding:13px 14px;background:rgba(255,255,255,.65)}.stat strong{display:block;font-size:22px;line-height:1.15;color:#332b39}.stat span{color:var(--muted);font-size:12px}.history-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.history-head h2{font-size:18px;font-weight:850}.refresh-btn,.filter{border:1px solid rgba(112,82,105,.14);background:rgba(255,255,255,.78);color:var(--muted);border-radius:999px;padding:7px 12px;font-size:13px}.refresh-btn{color:var(--ink);font-weight:700}.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}.filter.active{color:#fff;background:var(--black);border-color:var(--black)}.history-list{display:flex;flex-direction:column;gap:12px}.note{border:1px solid rgba(112,82,105,.12);border-radius:20px;background:rgba(255,255,255,.86);padding:15px;box-shadow:0 10px 22px rgba(98,62,86,.08)}.note-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px}.mood-tags,.tag-row,.reaction-row{display:flex;gap:6px;flex-wrap:wrap}.mood-tag,.tag{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 10px;font-size:12px;background:#fff0f7;color:#a94f7a;font-weight:700}.time{flex-shrink:0;color:var(--muted);font-size:12px}.meta{color:var(--muted);font-size:12px;margin-bottom:6px}.note-text{white-space:pre-wrap;word-break:break-word;font-size:15px}.tag-row{margin-top:10px}.tag{background:#eef8ff;color:#557d9f}.reaction-row{border-top:1px dashed rgba(112,82,105,.18);margin-top:12px;padding-top:12px}.reaction-btn{min-height:36px;border:1px solid #f1d8e2;background:#fff8fb;color:#9e5575;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:750;transition:.18s ease}.reaction-btn:hover:not(:disabled){border-color:var(--pink);background:#fff0f6;transform:translateY(-1px)}.reaction-btn:disabled{opacity:.65;cursor:wait}.delete-btn{display:block;margin:10px 0 0 auto;border:none;background:transparent;color:#c697a8;font-size:12px;padding:4px 8px}.empty{text-align:center;color:var(--muted);padding:34px 12px}.toast,.loading,.login-overlay,.splash{position:fixed;z-index:20}.toast{left:50%;bottom:calc(24px + var(--safe-bottom));transform:translateX(-50%) translateY(20px);background:rgba(48,40,58,.94);color:#fff;padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:.22s ease;white-space:nowrap;font-size:14px;box-shadow:0 10px 26px rgba(48,40,58,.22)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.loading{inset:0;display:none;place-items:center;background:rgba(255,244,248,.76);color:var(--muted);backdrop-filter:blur(8px)}.loading.show{display:grid}.login-overlay{inset:0;display:none;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff8fb,#ffe5f0);padding:calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bottom))}.login-overlay.show{display:flex}.login-card{width:min(370px,100%);background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.75);border-radius:26px;box-shadow:var(--shadow);padding:28px;text-align:center}.login-card .icon{font-size:48px;margin-bottom:8px}.login-card h2{font-size:21px;margin-bottom:8px}.login-card p{color:var(--muted);font-size:13px;margin-bottom:16px}.login-card input{text-align:center;letter-spacing:3px;margin-bottom:10px}.splash{inset:0;display:grid;place-items:center;background:#fff4f8;transition:opacity .38s ease,visibility .38s ease}.splash.hide{opacity:0;visibility:hidden}.splash-card{text-align:center;animation:rise .7s ease both}.splash-card img{width:138px;height:138px;border-radius:34px;box-shadow:0 18px 42px rgba(98,62,86,.18)}.splash-card strong{display:block;margin-top:16px;font-size:22px}.splash-card span{display:block;margin-top:4px;color:var(--muted);font-size:13px}@keyframes rise{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}@media(display-mode:standalone){body{overscroll-behavior-y:none}.app-shell{padding-top:calc(12px + var(--safe-top))}}@media(max-width:620px){.app-shell{padding-left:12px;padding-right:12px}.hero{grid-template-columns:1fr;min-height:0;padding-top:12px}.mascot-card{position:absolute;right:0;top:18px;width:118px;height:142px;opacity:.92}.ear{width:45px;height:45px}.face{width:92px;height:84px}.face::before,.face::after{top:37px;width:14px;height:18px}.face::before{left:24px}.face::after{right:24px}.smile{top:58px;width:26px}.bow{width:70px;height:44px}.bow::before,.bow::after{width:34px;height:28px}.bow i{left:26px;width:18px;height:18px}.lizard-tail{width:45px;height:58px;border-width:10px}.hero-copy{padding-right:104px}.subtitle{font-size:13px}.panel{padding:15px;border-radius:20px}.mood-grid{grid-template-columns:repeat(4,1fr);gap:7px}.mood-btn{min-height:58px;border-radius:16px}.mood-btn .emoji{font-size:28px}.form-grid,.stats{grid-template-columns:1fr}.reaction-btn{flex:1 1 calc(33.333% - 6px);padding-left:6px;padding-right:6px}.history-head{align-items:center}.toast{max-width:calc(100vw - 28px);white-space:normal;text-align:center}}@media(max-width:360px){.hero-copy{padding-right:88px}h1{font-size:26px}.mood-grid{gap:6px}.mood-btn{min-height:52px}.mood-btn .emoji{font-size:25px}.reaction-btn{font-size:11px}}
</style>
</head>
<body>
<div class="splash" id="splash"><div class="splash-card"><img src="/static/icon.svg" alt="小蜥蜴心情屋"><strong>小蜥蜴心情屋</strong><span>今天也会认真听你说</span></div></div>
<div class="login-overlay" id="loginOverlay"><div class="login-card"><div class="icon">🔐</div><h2>请输入密码</h2><p>这是我们的小小心情空间</p><div class="field"><input type="password" id="passwordInput" placeholder="密码" maxlength="40" autocomplete="off"></div><button class="submit-btn" onclick="doLogin()">进入</button></div></div>
<div class="loading" id="loading">正在加载心情记录...</div><div class="toast" id="toast"></div>
<main class="app-shell">
<header class="hero"><div class="hero-copy"><span class="eyebrow">🦎 私密心情屋</span><h1>今天的心情<br>想告诉小蜥蜴吗？</h1><p class="subtitle">把话放在这里，开心也好，难过也好，都会被温柔收好。</p></div><div class="mascot-card" aria-hidden="true"><span class="ear left"></span><span class="ear right"></span><span class="bow"><i></i></span><span class="lizard-tail"></span><span class="face"><i class="smile"></i></span><span class="star s1">✦</span><span class="star s2">♡</span><span class="star s3">✧</span></div></header>
<section class="panel"><div class="notice" id="notice"><span>💛</span><span id="noticeText"></span></div><div class="label">🌈 今天的心情是</div><div class="mood-grid" id="moodGrid"></div><div class="form-grid"><label class="field"><input id="senderInput" maxlength="20" placeholder="你的名字"></label><label class="field"><input id="tagsInput" maxlength="120" placeholder="标签，用逗号分开"></label></div><label class="field"><textarea id="noteText" maxlength="500" placeholder="写下今天想说的话..."></textarea></label><div class="text-row"><span>最多选择 3 种心情</span><span id="counter">0/500</span></div><button class="submit-btn" id="submitBtn" onclick="submitMood()">悄悄告诉小蜥蜴</button></section>
<section class="panel"><div class="stats"><div class="stat"><strong id="totalCount">0</strong><span>条心情记录</span></div><div class="stat"><strong id="latestTime">暂无</strong><span>最近更新</span></div></div><div class="history-head"><h2>📖 心情记录</h2><button class="refresh-btn" onclick="refreshNotes()">刷新</button></div><div class="filters" id="filters"></div><div class="history-list" id="historyList"></div></section>
</main>
<script>
const NEEDS_PASSWORD = {{ needs_password | tojson }};
const TEXT_MOODS = [
  { name: '开心', emoji: '😊' },
  { name: '难过', emoji: '😢' },
  { name: '生气', emoji: '😠' },
  { name: '委屈', emoji: '🥺' },
  { name: '想你', emoji: '💕' },
  { name: '需要安慰', emoji: '🤗' },
  { name: '想一个人静静', emoji: '🌙' }
];
const EMOJI_MOODS = ['😋','🥲','🥹','🧐','🤓','😜','😝','😞','😟','😣','😖','☹️','😓','😱','😨','😰'].map(value => ({ name: value, emoji: value }));
const MOODS = [...TEXT_MOODS, ...EMOJI_MOODS];
const REACTIONS = [
  { name: '抱抱你', emoji: '🤗' },
  { name: '收到啦', emoji: '💌' },
  { name: '想你了', emoji: '💕' }
];
let authPassword = NEEDS_PASSWORD ? '' : null;
let selectedMoods = [];
let notes = [];
let currentFilter = 'all';
let toastTimer = null;
let reactingId = null;
const moodGrid = document.getElementById('moodGrid');
const filters = document.getElementById('filters');
const historyList = document.getElementById('historyList');
const loading = document.getElementById('loading');
const toast = document.getElementById('toast');
const notice = document.getElementById('notice');
const noticeText = document.getElementById('noticeText');
const noteText = document.getElementById('noteText');
const submitBtn = document.getElementById('submitBtn');
const senderInput = document.getElementById('senderInput');
const tagsInput = document.getElementById('tagsInput');
const counter = document.getElementById('counter');
function headers(){const value={'Content-Type':'application/json'};if(authPassword)value['X-Mood-Password']=authPassword;return value}
function showToast(message){clearTimeout(toastTimer);toast.textContent=message;toast.classList.add('show');toastTimer=setTimeout(()=>toast.classList.remove('show'),2200)}
function escapeHtml(value){const div=document.createElement('div');div.textContent=value||'';return div.innerHTML}
function moodInfo(name){return MOODS.find(m=>m.name===name)||{name,emoji:name}}
function shortMoodName(name){return name==='想一个人静静'?'想静静':name}
function moodDisplay(name){const info=moodInfo(name);return TEXT_MOODS.some(m=>m.name===name)?`${info.emoji} ${escapeHtml(name)}`:escapeHtml(name)}
function defaultReactions(){return Object.fromEntries(REACTIONS.map(reaction=>[reaction.name,0]))}
function noteReactions(note){return {...defaultReactions(), ...(note.reactions||{})}}
function formatTime(iso){if(!iso)return'暂无';const date=new Date(iso);if(Number.isNaN(date.getTime()))return'刚刚';const now=new Date();const pad=n=>String(n).padStart(2,'0');const time=`${pad(date.getHours())}:${pad(date.getMinutes())}`;const sameDay=date.getFullYear()===now.getFullYear()&&date.getMonth()===now.getMonth()&&date.getDate()===now.getDate();if(sameDay)return`今天 ${time}`;const yesterday=new Date(now);yesterday.setDate(now.getDate()-1);const isYesterday=date.getFullYear()===yesterday.getFullYear()&&date.getMonth()===yesterday.getMonth()&&date.getDate()===yesterday.getDate();if(isYesterday)return`昨天 ${time}`;return`${date.getFullYear()}/${pad(date.getMonth()+1)}/${pad(date.getDate())} ${time}`}
function renderMoodButtons(){moodGrid.innerHTML=MOODS.map(mood=>`<button class="mood-btn" type="button" data-mood="${mood.name}" title="${mood.name}" aria-label="${mood.name}"><span class="emoji">${mood.emoji}</span></button>`).join('')}
function renderFilters(){filters.innerHTML=[`<button class="filter ${currentFilter==='all'?'active':''}" data-filter="all">全部</button>`,...TEXT_MOODS.map(mood=>`<button class="filter ${currentFilter===mood.name?'active':''}" data-filter="${mood.name}">${mood.emoji} ${shortMoodName(mood.name)}</button>`)].join('')}
function updateNotice(){const reminders={'生气':'他今天可能需要你多一点耐心和温柔。','委屈':'他心里可能有一点小委屈，记得抱抱他。','难过':'他今天心情不太好，一句温暖的话会很有用。','需要安慰':'他正在认真发出需要被靠近的信号。','😞':'他今天可能有点低落，轻轻陪一下就很好。','😟':'他好像有点担心，记得告诉他你在。','😣':'他可能撑得有点辛苦，给他一点软软的安慰。','😖':'他今天可能不太舒服，别让他一个人扛。','☹️':'他看起来需要一点点阳光和抱抱。','😓':'他可能有点累了，陪他慢慢缓一缓。','😱':'他可能被吓到了，先让他安心下来。','😨':'他可能有些害怕，温柔地靠近他。','😰':'他可能很紧张，告诉他慢慢来就好。'};const message=selectedMoods.map(m=>reminders[m]).find(Boolean);if(!message){notice.classList.remove('show');return}noticeText.textContent=message;notice.classList.add('show')}
function clearForm(){selectedMoods=[];noteText.value='';tagsInput.value='';document.querySelectorAll('.mood-btn').forEach(btn=>btn.classList.remove('selected'));counter.textContent='0/500';updateNotice()}
async function fetchNotes(){loading.classList.add('show');try{const res=await fetch('/api/notes',{headers:headers()});if(!res.ok)throw new Error('load failed');const data=await res.json();notes=Array.isArray(data)?data:[];renderHistory()}catch(error){notes=[];renderHistory();showToast('加载失败，请稍后再试')}finally{loading.classList.remove('show')}}
async function refreshNotes(){await fetchNotes();showToast('已刷新')}
async function submitMood(){const text=noteText.value.trim();if(!selectedMoods.length)return showToast('请先选择心情');if(!text)return showToast('写几句话再发送吧');submitBtn.disabled=true;submitBtn.textContent='正在发送...';try{const res=await fetch('/api/notes',{method:'POST',headers:headers(),body:JSON.stringify({mood:selectedMoods.join(','),text,sender:senderInput.value.trim(),tags:tagsInput.value.trim()})});const payload=await res.json().catch(()=>({}));if(!res.ok){showToast(payload.error||'发送失败');return}showToast(res.status===202?'已临时保存，请检查存储配置':'小蜥蜴收到啦');clearForm();await fetchNotes()}catch(error){showToast('网络出错了')}finally{submitBtn.disabled=false;submitBtn.textContent='悄悄告诉小蜥蜴'}}
async function addReaction(id,reaction){reactingId=`${id}:${reaction}`;renderHistory();try{const res=await fetch(`/api/notes/${id}/reactions`,{method:'POST',headers:headers(),body:JSON.stringify({reaction})});const payload=await res.json().catch(()=>({}));if(!res.ok){showToast(payload.error||'回应失败');return}notes=notes.map(note=>note.id===id?payload.note:note);renderHistory();showToast('回应已送达')}catch(error){showToast('回应失败，请稍后再试')}finally{reactingId=null;renderHistory()}}
async function deleteNote(id){if(!confirm('确定删除这条记录吗？'))return;try{const res=await fetch(`/api/notes/${id}`,{method:'DELETE',headers:headers()});if(!res.ok)throw new Error('delete failed');notes=notes.filter(note=>note.id!==id);renderHistory();showToast('已删除')}catch(error){showToast('删除失败')}}
async function doLogin(){const password=document.getElementById('passwordInput').value.trim();if(!password)return;try{const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});if(!res.ok){showToast('密码不正确');return}authPassword=password;document.getElementById('loginOverlay').classList.remove('show');await fetchNotes()}catch(error){showToast('验证失败')}}
function renderHistory(){const filtered=currentFilter==='all'?notes:notes.filter(note=>String(note.mood||'').split('+').includes(currentFilter));document.getElementById('totalCount').textContent=notes.length;document.getElementById('latestTime').textContent=notes.length?formatTime(notes[0].time):'暂无';if(!filtered.length){historyList.innerHTML='<div class="empty">还没有记录，写下今天的心情吧。</div>';return}historyList.innerHTML=filtered.map(note=>{const moodTags=String(note.mood||'').split('+').filter(Boolean).map(name=>`<span class="mood-tag">${moodDisplay(name)}</span>`).join('');const tags=Array.isArray(note.tags)?note.tags:[];const tagHtml=tags.length?`<div class="tag-row">${tags.map(tag=>`<span class="tag">#${escapeHtml(tag)}</span>`).join('')}</div>`:'';const reactions=noteReactions(note);const reactionHtml=`<div class="reaction-row">${REACTIONS.map(item=>{const key=`${note.id}:${item.name}`;return`<button class="reaction-btn" onclick="addReaction(${Number(note.id)}, '${item.name}')" ${reactingId===key?'disabled':''}>${item.emoji} ${item.name} ${Number(reactions[item.name]||0)}</button>`}).join('')}</div>`;return`<article class="note"><div class="note-top"><div class="mood-tags">${moodTags}</div><span class="time">${formatTime(note.time)}</span></div><div class="meta">来自 ${escapeHtml(note.sender||'匿名')}</div><div class="note-text">${escapeHtml(note.text)}</div>${tagHtml}${reactionHtml}<button class="delete-btn" onclick="deleteNote(${Number(note.id)})">删除</button></article>`}).join('')}
moodGrid.addEventListener('click',event=>{const button=event.target.closest('.mood-btn');if(!button)return;const mood=button.dataset.mood;if(selectedMoods.includes(mood)){selectedMoods=selectedMoods.filter(item=>item!==mood);button.classList.remove('selected')}else{if(selectedMoods.length>=3){showToast('一次最多选择 3 种心情');return}selectedMoods.push(mood);button.classList.add('selected')}updateNotice()});
filters.addEventListener('click',event=>{const button=event.target.closest('.filter');if(!button)return;currentFilter=button.dataset.filter;renderFilters();renderHistory()});
noteText.addEventListener('input',()=>{counter.textContent=`${noteText.value.length}/500`});
document.getElementById('passwordInput').addEventListener('keydown',event=>{if(event.key==='Enter')doLogin()});
window.addEventListener('load',()=>{setTimeout(()=>document.getElementById('splash').classList.add('hide'),650)});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}))}
renderMoodButtons();renderFilters();if(NEEDS_PASSWORD){document.getElementById('loginOverlay').classList.add('show')}else{fetchNotes()}
</script>
</body>
</html>
