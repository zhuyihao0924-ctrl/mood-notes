<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#dff4ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="小蜥蜴">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.webmanifest?v=blue1">
<link rel="icon" href="/static/app-icon-192.png?v=photo6" type="image/png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=photo6">
<title>小蜥蜴日常</title>
<style>
:root{
  --bg:#dff4ff;
  --bg2:#f4fbff;
  --ink:#24465f;
  --muted:#7da0b8;
  --card:#ffffffd9;
  --line:#c9e5f4;
  --blue:#4faee8;
  --blue2:#9cdbff;
  --deep:#237fbd;
  --soft:#eaf7ff;
  --shadow:0 18px 42px rgba(52,132,181,.18);
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{min-height:100vh;min-height:100dvh;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:linear-gradient(180deg,#d8f2ff 0%,#f7fcff 48%,#e7f7ff 100%);line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body:before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(circle at 16% 10%,rgba(255,255,255,.78) 0 42px,transparent 43px),radial-gradient(circle at 88% 17%,rgba(255,255,255,.72) 0 58px,transparent 59px),radial-gradient(circle at 18% 88%,rgba(151,218,255,.42),transparent 28%),linear-gradient(90deg,rgba(255,255,255,.24) 1px,transparent 1px),linear-gradient(0deg,rgba(255,255,255,.24) 1px,transparent 1px);background-size:auto,auto,auto,28px 28px,28px 28px}
button,input,textarea{font:inherit;color:inherit}
button{border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.app{width:min(430px,100%);margin:0 auto;padding:calc(8px + var(--safe-top)) 14px calc(88px + var(--safe-bottom))}
.nav{height:54px;display:grid;grid-template-columns:44px 1fr 44px;align-items:center}
.nav h1{text-align:center;font-size:22px;font-weight:900;letter-spacing:.08em;color:#1f597e}
.nav-btn{height:44px;background:transparent;font-size:34px;color:#315a72}
.nav-btn:last-child{font-size:28px;letter-spacing:4px}
.hero{position:relative;overflow:hidden;border-radius:30px;margin:4px 0 12px;padding:28px 20px 24px;min-height:188px;text-align:center;background:linear-gradient(180deg,#eefaff 0%,#ffffff 100%);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.82)}
.hero:before{content:"";position:absolute;left:-30px;top:-22px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,#b9e9ff 0 34%,transparent 35%),radial-gradient(circle at 72% 30%,#ffffff 0 22%,transparent 23%);opacity:.55}
.hero:after{content:"🦎";position:absolute;right:22px;bottom:24px;font-size:58px;filter:drop-shadow(0 10px 16px rgba(51,139,100,.16))}
.hero-icon{font-size:42px;margin-bottom:2px}
.hero-title{font-size:31px;font-weight:900;letter-spacing:.12em;color:var(--deep)}
.hero-date{margin-top:5px;color:#7199b4;font-weight:700;letter-spacing:.14em}
.quote{margin:0 4px 12px;padding:16px 18px;border-radius:24px;background:rgba(255,255,255,.9);border:1px solid var(--line);box-shadow:0 10px 24px rgba(68,141,184,.12);text-align:center;font-size:17px;color:#376177}
.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.card{border-radius:24px;background:var(--card);border:1px solid rgba(255,255,255,.8);box-shadow:var(--shadow);backdrop-filter:blur(16px)}
.mini-card{min-height:156px;padding:15px}
.card-title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;font-size:15px;font-weight:900;color:var(--deep)}
.mini-btn{height:32px;padding:0 12px;border-radius:999px;background:#f8fcff;border:1px solid var(--line);color:var(--deep);font-size:12px;font-weight:800}
.weather-main{display:flex;align-items:center;gap:12px}
.weather-icon{font-size:48px}
.temp{font-size:42px;line-height:1;font-weight:900;color:#3aa5e5}
.weather-city{font-size:12px;font-weight:900;color:#315a72}
.weather-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;color:var(--muted);font-size:11px}
.tip{margin-top:10px;padding:9px 10px;border-radius:15px;background:var(--soft);color:#3d657b;font-size:12px}
.analysis strong{display:block;color:#308fd0;font-size:14px;line-height:1.45;margin-bottom:8px}
.analysis span{display:block;font-size:12px;color:#466c82}
.checkin{padding:16px;margin-bottom:12px}
.check-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
.check-title{font-size:17px;font-weight:900;color:var(--deep)}
.check-right{display:flex;align-items:center;gap:8px}
.check-stats{display:flex;gap:8px}
.check-pill{min-width:64px;text-align:center;border-radius:16px;background:var(--soft);padding:8px 10px}
.check-pill strong{display:block;color:var(--deep);font-size:20px;line-height:1}
.check-pill span{display:block;color:var(--muted);font-size:11px;margin-top:3px}
.calendar-toggle{height:36px;padding:0 12px;border-radius:999px;background:#f8fcff;border:1px solid var(--line);color:var(--deep);font-size:12px;font-weight:900;white-space:nowrap}
.calendar-wrap{display:none}
.checkin.open .calendar-wrap{display:block}
.calendar-title{display:flex;align-items:center;justify-content:center;gap:14px;margin:8px 0 9px;color:#416a80;font-weight:900}
.month-btn{width:32px;height:32px;border-radius:50%;background:#f7fcff;border:1px solid var(--line);color:var(--deep);font-weight:900}
.week-row,.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.week-row{margin-bottom:5px;color:#86a7ba;font-size:11px;text-align:center;font-weight:800}
.day{min-height:50px;border-radius:14px;background:rgba(234,247,255,.72);border:1px solid transparent;padding:4px 2px;text-align:center;position:relative}
.day.blank{background:transparent}
.day.today{border-color:#64bdec;background:#f7fcff}
.day-num{display:block;font-size:11px;color:#6f91a5;font-weight:800}
.day-moods{font-size:14px;line-height:1.05;display:grid;grid-template-columns:repeat(2,1fr);gap:1px;justify-items:center;min-height:29px;overflow:hidden}
.day-moods span{display:block;line-height:1}
.panel,.input-card,.history{padding:16px;margin-bottom:12px}
.label{font-size:17px;font-weight:900;color:var(--deep);margin-bottom:12px}
.notice{display:none;margin-bottom:12px;border-radius:18px;background:#eaf7ff;padding:11px 12px;color:#2e719c;font-size:13px}
.notice.show{display:block}
.mood-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px}
.mood-btn{aspect-ratio:1;border-radius:18px;background:#f9fdff;border:1px solid var(--line);display:grid;place-items:center;font-size:25px;box-shadow:0 8px 18px rgba(60,139,184,.09)}
.mood-btn.selected{background:linear-gradient(180deg,#dff4ff,#fff);border-color:#46aee8;box-shadow:0 0 0 3px rgba(79,174,232,.18);transform:translateY(-1px)}
.selected-strip{display:none;margin:10px 0 0;color:#4f7991;font-size:13px}
.selected-strip.show{display:block}
.field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:18px;background:#fbfeff;outline:none;padding:12px 13px;font-size:14px}
.field textarea{min-height:112px;resize:vertical}
.counter{text-align:right;color:var(--muted);font-size:11px;margin-top:5px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:10px 0}
.submit-btn{display:block;width:74%;min-width:220px;margin:8px auto 0;padding:13px 16px;border-radius:999px;background:linear-gradient(135deg,#45aee9,#9fddff);color:#fff;font-size:15px;font-weight:900;box-shadow:0 14px 26px rgba(61,160,220,.28)}
.submit-btn:disabled{opacity:.65}
.history-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.history-head h2{font-size:17px;color:var(--deep)}
.history-actions{display:flex;gap:6px}
.refresh-btn,.filter{min-height:32px;padding:0 10px;border-radius:13px;border:1px solid var(--line);background:#f8fcff;color:var(--deep);font-size:12px;font-weight:800}
.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.filter{height:42px;display:flex;align-items:center;justify-content:center;gap:3px;overflow:hidden}
.filter.active{background:linear-gradient(135deg,#45aee9,#9fddff);color:#fff;border-color:transparent}
.stats{display:flex;gap:8px;margin-bottom:10px}
.stat{flex:1;border-radius:18px;background:var(--soft);padding:10px;color:var(--deep)}
.stat strong{display:block;font-size:22px;line-height:1.1}
.stat span{font-size:11px;color:var(--muted)}
.queue-panel{display:none;margin-bottom:12px;padding:12px;border-radius:18px;background:#fff8df;border:1px solid #f0df9c;color:#715d13}
.queue-panel.show{display:block}
.queue-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.queue-title{font-size:14px;font-weight:900}
.queue-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.queue-btn{min-height:32px;padding:0 10px;border-radius:999px;background:#fffdf1;border:1px solid #eadb99;color:#715d13;font-size:12px;font-weight:900}
.queue-list{margin-top:8px;display:grid;gap:6px}
.queue-item{border-radius:14px;background:rgba(255,255,255,.62);padding:8px 9px;font-size:12px;color:#725f1a}
.queue-item strong{display:block;color:#3d657b;margin-bottom:2px}
.note{padding:12px;border-radius:18px;background:#fbfeff;border:1px solid var(--line);margin-bottom:10px}
.note.pending{background:#fffaf0;border-color:#ecd98f}
.note-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}
.mood-tags,.tag-row,.reaction-row{display:flex;gap:6px;flex-wrap:wrap}
.mood-tag,.tag{border-radius:999px;background:var(--soft);color:var(--deep);padding:3px 8px;font-size:11px;font-weight:800}
.time,.meta{font-size:11px;color:var(--muted)}
.note-text{font-size:14px;white-space:pre-wrap;word-break:break-word;margin-top:4px}
.tag-row{margin-top:8px}
.reaction-row{border-top:1px dashed var(--line);padding-top:9px;margin-top:10px}
.reaction-btn{flex:1 1 calc(33.333% - 6px);min-height:34px;border-radius:999px;background:var(--soft);color:var(--deep);font-size:12px;font-weight:800;border:1px solid var(--line)}
.delete-btn{display:block;background:transparent;color:var(--muted);font-size:12px;margin:8px 0 0 auto}
.empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:13px}
.fab{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));transform:translateX(-50%);width:68px;height:68px;border-radius:50%;z-index:10;background:linear-gradient(135deg,#45aee9,#9fddff);color:#fff;font-size:42px;line-height:1;box-shadow:0 14px 34px rgba(61,160,220,.36),0 0 0 7px rgba(255,255,255,.78)}
.toast,.loading,.login-overlay,.splash{position:fixed;z-index:20}
.toast{left:50%;bottom:calc(94px + var(--safe-bottom));transform:translateX(-50%) translateY(18px);max-width:calc(100vw - 28px);background:rgba(30,67,90,.94);color:#fff;padding:10px 16px;border-radius:999px;opacity:0;pointer-events:none;transition:.22s ease;font-size:13px;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{inset:0;display:none;place-items:center;background:rgba(223,244,255,.72);backdrop-filter:blur(8px);color:#557d94}
.loading.show{display:grid}
.login-overlay{inset:0;display:none;align-items:center;justify-content:center;background:linear-gradient(180deg,#dff4ff,#f7fcff);padding:20px}
.login-overlay.show{display:flex}
.login-card{width:min(340px,100%);padding:26px;text-align:center}
.login-card .icon{font-size:44px}
.login-card h2{margin:8px 0}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:14px}
.login-card input{text-align:center;letter-spacing:3px;margin-bottom:10px}
.splash{inset:0;display:grid;place-items:center;background:linear-gradient(180deg,#dff4ff,#f7fcff);transition:.35s ease}
.splash.hide{opacity:0;visibility:hidden}
.splash-card{text-align:center}
.splash-card img{width:112px;height:112px;border-radius:26px;box-shadow:var(--shadow)}
.splash-card strong{display:block;margin-top:14px;font-size:21px}
.splash-card span{display:block;color:var(--muted);font-size:13px}
@media(max-width:380px){
  .app{padding-left:10px;padding-right:10px}
  .dashboard{gap:8px}
  .mini-card{padding:13px}
  .temp{font-size:36px}
  .weather-icon{font-size:42px}
  .mood-grid{grid-template-columns:repeat(5,1fr)}
  .filters{grid-template-columns:repeat(3,1fr)}
  .form-grid{grid-template-columns:1fr}
  .check-head{align-items:flex-start}
  .check-right{align-items:flex-end;flex-direction:column}
  .check-pill{min-width:56px}
}
</style>
</head>
<body>
<div class="splash" id="splash">
  <div class="splash-card"><img src="/static/apple-touch-icon.png?v=photo6" alt="小蜥蜴"><strong>小蜥蜴日常</strong><span>今天也会认真听你说</span></div>
</div>
<div class="login-overlay" id="loginOverlay">
  <div class="login-card card">
    <div class="icon">🔐</div>
    <h2>请输入密码</h2>
    <p>这是我们的小小心情空间</p>
    <label class="field"><input type="password" id="passwordInput" placeholder="密码" maxlength="40" autocomplete="current-password"></label>
    <button class="submit-btn" onclick="doLogin()">进入</button>
  </div>
</div>
<div class="loading" id="loading">正在加载心情记录...</div>
<div class="toast" id="toast"></div>
<main class="app">
  <nav class="nav">
    <button class="nav-btn" type="button" aria-label="关闭">×</button>
    <h1>小蜥蜴日常</h1>
    <button class="nav-btn" type="button" aria-label="更多">···</button>
  </nav>

  <header class="hero">
    <div class="hero-icon">☁️</div>
    <div class="hero-title">小蜥蜴日常</div>
    <div class="hero-date" id="todayDate">2026-05-25 周一</div>
  </header>
  <div class="quote">“ 心存温柔，山河浪漫。 ”</div>

  <section class="dashboard">
    <div class="card mini-card">
      <div class="card-title"><span>☼ 今日天气</span><button class="mini-btn" onclick="useCurrentLocation()">定位</button></div>
      <div class="weather-main"><div class="weather-icon" id="weatherIcon">☁️</div><div><div class="temp"><span id="weatherTemp">--</span>°C</div><div class="weather-city" id="weatherCity">厦门海沧</div></div></div>
      <div class="weather-meta"><span id="weatherText">加载中</span><span id="weatherHumidity">湿度 --</span><span id="weatherWind">风力 --</span></div>
      <div class="tip" id="weatherTip">正在看看今天适合怎么照顾自己...</div>
    </div>
    <div class="card mini-card analysis">
      <div class="card-title"><span>♡ 智能提醒</span><button class="mini-btn" onclick="loadAnalysis()">更新</button></div>
      <strong id="analysisSummary">正在整理最近的心情...</strong>
      <span id="analysisSuggestion">小蜥蜴会根据你的最近记录生成提醒。</span>
      <div class="tip" id="weatherRange">-- / --</div>
    </div>
  </section>

  <section class="card checkin" id="checkinCard">
    <div class="check-head">
      <div class="check-title">🗓️ 打卡日期</div>
      <div class="check-right">
        <div class="check-stats">
          <div class="check-pill"><strong id="streakCount">0</strong><span>连续</span></div>
          <div class="check-pill"><strong id="monthCount">0</strong><span>本月</span></div>
        </div>
        <button class="calendar-toggle" id="calendarToggle" type="button">查看日历</button>
      </div>
    </div>
    <div class="calendar-wrap" id="calendarWrap">
      <div class="calendar-title"><button class="month-btn" id="prevMonth">‹</button><span id="calendarTitle">2026年05月</span><button class="month-btn" id="nextMonth">›</button></div>
      <div class="week-row"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </section>

  <section class="card panel">
    <div class="notice" id="notice"><span id="noticeText"></span></div>
    <div class="label">✨ 今日心情</div>
    <div class="mood-grid" id="moodGrid"></div>
    <div class="selected-strip" id="selectedStrip"></div>
  </section>

  <section class="card input-card">
    <div class="label">记录此刻的想法...</div>
    <label class="field"><textarea id="noteText" maxlength="500" placeholder="写下你的心情、想法和小日常..."></textarea></label>
    <div class="counter" id="counter">0/500</div>
    <div class="form-grid">
      <label class="field"><input id="senderInput" maxlength="20" placeholder="发送给（可选）"></label>
      <label class="field"><input id="tagsInput" maxlength="120" placeholder="标签（可选）"></label>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitMood()">提交心情日记 ♡</button>
  </section>

  <section class="card history">
    <div class="history-head"><h2>▦ 历史记录</h2><div class="history-actions"><button class="refresh-btn" onclick="refreshNotes()">刷新</button></div></div>
    <div class="stats"><div class="stat"><strong id="totalCount">0</strong><span>条心情记录</span></div><div class="stat"><strong id="latestTime">暂无</strong><span>最近更新</span></div></div>
    <div class="queue-panel" id="queuePanel">
      <div class="queue-head">
        <div class="queue-title" id="queueTitle">本机暂存 0 条</div>
        <div class="queue-actions"><button class="queue-btn" onclick="syncPendingNotes()">同步暂存</button><button class="queue-btn" onclick="clearPendingNotes()">清空</button></div>
      </div>
      <div class="queue-list" id="queueList"></div>
    </div>
    <div class="filters" id="filters"></div>
    <div class="history-list" id="historyList"></div>
  </section>
</main>
<button class="fab" type="button" onclick="noteText.focus()">+</button>
<script>
const NEEDS_PASSWORD = {{ needs_password | tojson }};
const TEXT_MOODS=[{name:'开心',emoji:'😊'},{name:'难过',emoji:'😢'},{name:'生气',emoji:'😡'},{name:'委屈',emoji:'🥺'},{name:'想你',emoji:'💕'},{name:'需要安慰',emoji:'🤗'},{name:'想一个人静静',emoji:'🌙'}];
const EMOJI_MOODS=['😋','🥲','🥹','🧐','🤓','😜','😝','😞','😟','😣','😖','☹️','😓','😱','😨','😰'].map(value=>({name:value,emoji:value}));
const MOODS=[...TEXT_MOODS,...EMOJI_MOODS];
const REACTIONS=[{name:'抱抱你',emoji:'🤗'},{name:'收到啦',emoji:'💌'},{name:'想你了',emoji:'💗'}];
const PENDING_KEY='moodNotesPendingQueueV1';
let authPassword=localStorage.getItem('moodPassword')||'',selectedMoods=[],notes=[],pendingNotes=[],cloudAvailable=true,currentFilter='all',toastTimer=null,reactingId=null,calendarDate=new Date(),calendarOpen=false;
const $=id=>document.getElementById(id);
const moodGrid=$('moodGrid'),filters=$('filters'),historyList=$('historyList'),loading=$('loading'),toast=$('toast'),notice=$('notice'),noticeText=$('noticeText'),noteText=$('noteText'),submitBtn=$('submitBtn'),senderInput=$('senderInput'),tagsInput=$('tagsInput'),counter=$('counter');
function headers(){const value={'Content-Type':'application/json'};if(authPassword)value['X-Mood-Password']=authPassword;return value}
function showToast(message){clearTimeout(toastTimer);toast.textContent=message;toast.classList.add('show');toastTimer=setTimeout(()=>toast.classList.remove('show'),2400)}
function escapeHtml(value){const div=document.createElement('div');div.textContent=value||'';return div.innerHTML}
function moodInfo(name){return MOODS.find(m=>m.name===name)||{name,emoji:name}}
function shortMoodName(name){return name==='想一个人静静'?'想静静':name}
function moodDisplay(name){const info=moodInfo(name);return TEXT_MOODS.some(m=>m.name===name)?`${info.emoji} ${escapeHtml(name)}`:escapeHtml(name)}
function defaultReactions(){return Object.fromEntries(REACTIONS.map(reaction=>[reaction.name,0]))}
function noteReactions(note){return {...defaultReactions(),...(note.reactions||{})}}
function formatTime(iso){if(!iso)return'暂无';const date=new Date(iso);if(Number.isNaN(date.getTime()))return'刚刚';const now=new Date();const pad=n=>String(n).padStart(2,'0');const time=`${pad(date.getHours())}:${pad(date.getMinutes())}`;const sameDay=date.getFullYear()===now.getFullYear()&&date.getMonth()===now.getMonth()&&date.getDate()===now.getDate();if(sameDay)return`今天 ${time}`;return`${date.getMonth()+1}/${date.getDate()} ${time}`}
function localDayKey(iso){const date=new Date(iso);if(Number.isNaN(date.getTime()))return'';const pad=n=>String(n).padStart(2,'0');return`${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`}
function renderMoodButtons(){moodGrid.innerHTML=MOODS.map(mood=>`<button class="mood-btn" type="button" data-mood="${mood.name}" title="${mood.name}" aria-label="${mood.name}">${mood.emoji}</button>`).join('')}
function renderFilters(){filters.innerHTML=[`<button class="filter ${currentFilter==='all'?'active':''}" data-filter="all">全部</button>`,...TEXT_MOODS.map(mood=>`<button class="filter ${currentFilter===mood.name?'active':''}" data-filter="${mood.name}">${mood.emoji}<span>${shortMoodName(mood.name)}</span></button>`)].join('')}
function updateToday(){const now=new Date();const pad=n=>String(n).padStart(2,'0');const week='日一二三四五六'[now.getDay()];$('todayDate').textContent=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} 周${week}`}
function updateNotice(){const reminders={'生气':'他今天可能需要你多一点耐心和温柔。','委屈':'他心里可能有一点小委屈，记得抱抱他。','难过':'他今天心情不太好，一句温暖的话会很有用。','需要安慰':'他正在认真发出需要被靠近的信号。','😞':'他今天可能有点低落，轻轻陪一下就很好。','😟':'他好像有点担心，记得告诉他你在。','😣':'他可能撑得有点辛苦，给他一点软软的安慰。','😖':'他今天可能不太舒服，别让他一个人扛。','☹️':'他看起来需要一点点阳光和抱抱。','😓':'他可能有点累了，陪他慢慢缓一缓。','😱':'他可能被吓到了，先让他安心下来。','😨':'他可能有些害怕，温柔地靠近他。','😰':'他可能很紧张，告诉他慢慢来就好。'};const message=selectedMoods.map(m=>reminders[m]).find(Boolean);if(!message){notice.classList.remove('show');return}noticeText.textContent=message;notice.classList.add('show')}
function updateSelectedStrip(){const strip=$('selectedStrip');if(!selectedMoods.length){strip.classList.remove('show');strip.textContent='';return}strip.textContent=`已选择：${selectedMoods.map(name=>moodInfo(name).emoji).join(' ')}（最多 3 个）`;strip.classList.add('show')}
function clearForm(){selectedMoods=[];noteText.value='';tagsInput.value='';document.querySelectorAll('.mood-btn').forEach(btn=>btn.classList.remove('selected'));counter.textContent='0/500';updateNotice();updateSelectedStrip()}
function loadPendingNotes(){try{const data=JSON.parse(localStorage.getItem(PENDING_KEY)||'[]');pendingNotes=Array.isArray(data)?data:[]}catch(error){pendingNotes=[]}renderPendingNotes()}
function savePendingNotes(){localStorage.setItem(PENDING_KEY,JSON.stringify(pendingNotes));renderPendingNotes()}
function makePendingNote(){return{localId:`local-${Date.now()}-${Math.random().toString(16).slice(2)}`,mood:selectedMoods.join('+'),text:noteText.value.trim(),sender:senderInput.value.trim()||'匿名',tags:tagsInput.value.trim(),time:new Date().toISOString(),reactions:defaultReactions(),pending:true}}
function queuePendingNote(note){pendingNotes.unshift(note);savePendingNotes();renderHistory();renderCalendar()}
function renderPendingNotes(){const panel=$('queuePanel');if(!pendingNotes.length&&cloudAvailable){panel.classList.remove('show');$('queueList').innerHTML='';$('queueTitle').textContent='本机暂存 0 条';return}panel.classList.add('show');$('queueTitle').textContent=cloudAvailable?`本机暂存 ${pendingNotes.length} 条`:`云端暂不可用，本机暂存 ${pendingNotes.length} 条`;const help=cloudAvailable?'':'<div class="queue-item"><strong>可以继续写</strong>提交失败时会自动保存到这台设备，等云端恢复后点“同步暂存”。</div>';$('queueList').innerHTML=help+pendingNotes.slice(0,3).map(note=>`<div class="queue-item"><strong>${String(note.mood||'').split('+').map(name=>moodInfo(name).emoji).join(' ')} ${formatTime(note.time)}</strong>${escapeHtml(note.text).slice(0,52)}${note.text.length>52?'...':''}</div>`).join('')+(pendingNotes.length>3?`<div class="queue-item">还有 ${pendingNotes.length-3} 条等待同步</div>`:'')}
function allNotes(){return [...pendingNotes.map(note=>({...note,id:note.localId,pending:true})),...notes]}
async function loadWeather(query='city=厦门海沧'){try{const res=await fetch(`/api/weather?${query}`);const data=await res.json();$('weatherIcon').textContent=data.emoji||'🌤️';$('weatherCity').textContent=data.city||'厦门海沧';$('weatherTemp').textContent=data.temperature??'--';$('weatherText').textContent=data.weather||'暂不可用';$('weatherRange').textContent=(data.today_high!=null&&data.today_low!=null)?`明日 ${data.tomorrow} · ↑${data.today_high}° ↓${data.today_low}°`:'明日天气加载中';$('weatherHumidity').textContent=data.humidity!=null?`湿度 ${data.humidity}%`:'湿度 --';$('weatherWind').textContent=data.wind_level!=null?`风力 ${data.wind_level}级`:'风力 --';$('weatherTip').textContent=data.reminder||'今天也要好好照顾自己。'}catch(error){$('weatherTip').textContent='天气暂时没有取到，出门前再看一眼窗外。'}}
function useCurrentLocation(){if(!navigator.geolocation){showToast('这个设备暂时不支持定位');return}showToast('正在请求定位...');navigator.geolocation.getCurrentPosition(pos=>{const {latitude,longitude}=pos.coords;loadWeather(`lat=${latitude}&lon=${longitude}`);showToast('已切换到当前位置天气')},()=>showToast('定位被拒绝，继续显示厦门海沧'),{enableHighAccuracy:false,timeout:9000,maximumAge:900000})}
async function loadAnalysis(){if(NEEDS_PASSWORD&&!authPassword){$('analysisSummary').textContent='输入密码后显示智能分析';$('analysisSuggestion').textContent='小蜥蜴会根据你的最近记录生成提醒。';return}try{const res=await fetch('/api/analysis',{headers:headers()});const data=await res.json();if(res.status===401){handleUnauthorized();return}if(!res.ok)throw new Error(data.error||'analysis failed');$('analysisSummary').textContent=data.summary||'小蜥蜴看见了你最近的心情。';$('analysisSuggestion').textContent=data.suggestion||'先照顾好今天的自己。'}catch(error){$('analysisSummary').textContent='暂时没有取到分析';$('analysisSuggestion').textContent=error.message||'记录功能仍然正常，稍后再刷新看看。'}}
async function fetchNotes(){loading.classList.add('show');try{const res=await fetch('/api/notes',{headers:headers()});const data=await res.json().catch(()=>({}));if(res.status===401){handleUnauthorized();return}if(!res.ok)throw new Error(data.error||'加载失败');cloudAvailable=true;notes=Array.isArray(data)?data:[];renderHistory();renderCalendar();loadAnalysis()}catch(error){cloudAvailable=false;renderPendingNotes();renderHistory();renderCalendar();showToast('云端暂时连不上，可继续写，提交会本机暂存')}finally{loading.classList.remove('show')}}
async function refreshNotes(){await fetchNotes();showToast('已刷新')}
async function submitMood(){const text=noteText.value.trim();if(!selectedMoods.length)return showToast('请先选择心情');if(!text)return showToast('写几句话再发送吧');const pendingDraft=makePendingNote();submitBtn.disabled=true;submitBtn.textContent='正在发送...';try{const res=await fetch('/api/notes',{method:'POST',headers:headers(),body:JSON.stringify({mood:selectedMoods.join(','),text,sender:senderInput.value.trim(),tags:tagsInput.value.trim()})});const payload=await res.json().catch(()=>({}));if(res.status===401){handleUnauthorized();return}if(!res.ok){cloudAvailable=false;queuePendingNote(pendingDraft);clearForm();showToast('已保存到本机暂存，云端恢复后再同步');return}cloudAvailable=true;showToast('小蜥蜴收到啦');clearForm();await fetchNotes()}catch(error){cloudAvailable=false;queuePendingNote(pendingDraft);clearForm();showToast('已保存到本机暂存，云端恢复后再同步')}finally{submitBtn.disabled=false;submitBtn.textContent='提交心情日记 ♡'}}
async function syncPendingNotes(){if(!pendingNotes.length)return showToast(cloudAvailable?'没有暂存记录':'云端还没恢复，暂无可同步记录');if(NEEDS_PASSWORD&&!authPassword){handleUnauthorized();return}let synced=0;const failed=[];loading.classList.add('show');try{for(const note of pendingNotes){try{const res=await fetch('/api/notes',{method:'POST',headers:headers(),body:JSON.stringify({mood:String(note.mood||'').split('+').join(','),text:note.text,sender:note.sender,tags:note.tags})});const payload=await res.json().catch(()=>({}));if(res.status===401){handleUnauthorized();failed.push(note);break}if(!res.ok)throw new Error(payload.error||'同步失败');synced++}catch(error){failed.push(note)}}cloudAvailable=failed.length===0;pendingNotes=failed;savePendingNotes();await fetchNotes();showToast(synced?`已同步 ${synced} 条${failed.length?`，${failed.length} 条仍暂存`:''}`:'云端仍不可用，暂存继续保留')}finally{loading.classList.remove('show')}}
function clearPendingNotes(){if(!pendingNotes.length)return;if(!confirm('确定清空本机暂存吗？清空后这些未同步记录会消失。'))return;pendingNotes=[];savePendingNotes();renderHistory();renderCalendar();showToast('已清空本机暂存')}
async function addReaction(id,reaction){reactingId=`${id}:${reaction}`;renderHistory();try{const res=await fetch(`/api/notes/${id}/reactions`,{method:'POST',headers:headers(),body:JSON.stringify({reaction})});const payload=await res.json().catch(()=>({}));if(res.status===401){handleUnauthorized();return}if(!res.ok){showToast(payload.error||'回应失败');return}notes=notes.map(note=>note.id===id?payload.note:note);renderHistory();renderCalendar();showToast('回应已送达')}catch(error){showToast('回应失败，请稍后再试')}finally{reactingId=null;renderHistory()}}
async function deleteNote(id){if(!confirm('确定删除这条记录吗？'))return;try{const res=await fetch(`/api/notes/${id}`,{method:'DELETE',headers:headers()});const payload=await res.json().catch(()=>({}));if(res.status===401){handleUnauthorized();return}if(!res.ok)throw new Error(payload.error||'delete failed');notes=notes.filter(note=>note.id!==id);renderHistory();renderCalendar();loadAnalysis();showToast('已删除')}catch(error){showToast(error.message||'删除失败')}}
async function doLogin(){const password=$('passwordInput').value.trim();if(!password)return;try{const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});if(!res.ok){showToast('密码不正确');return}authPassword=password;localStorage.setItem('moodPassword',password);$('loginOverlay').classList.remove('show');await fetchNotes()}catch(error){showToast('验证失败')}}
function handleUnauthorized(){authPassword='';localStorage.removeItem('moodPassword');$('loginOverlay').classList.add('show');showToast('密码已失效，请重新输入')}
function renderHistory(){const source=allNotes();const filtered=currentFilter==='all'?source:source.filter(note=>String(note.mood||'').split('+').includes(currentFilter));$('totalCount').textContent=notes.length;$('latestTime').textContent=notes.length?formatTime(notes[0].time):'暂无';renderPendingNotes();if(!filtered.length){historyList.innerHTML='<div class="empty">还没有记录，写下今天的心情吧。</div>';return}historyList.innerHTML=filtered.map(note=>{const moodTags=String(note.mood||'').split('+').filter(Boolean).map(name=>`<span class="mood-tag">${moodDisplay(name)}</span>`).join('');const tags=Array.isArray(note.tags)?note.tags:normalizeTagsForView(note.tags);const tagHtml=tags.length?`<div class="tag-row">${tags.map(tag=>`<span class="tag">#${escapeHtml(tag)}</span>`).join('')}</div>`:'';const reactions=noteReactions(note);const reactionHtml=note.pending?'<div class="reaction-row"><span class="mood-tag">等待同步到云端</span></div>':`<div class="reaction-row">${REACTIONS.map(item=>{const key=`${note.id}:${item.name}`;return`<button class="reaction-btn" onclick="addReaction(${Number(note.id)}, '${item.name}')" ${reactingId===key?'disabled':''}>${item.emoji} ${item.name} ${Number(reactions[item.name]||0)}</button>`}).join('')}</div>`;const deleteHtml=note.pending?`<button class="delete-btn" onclick="deletePendingNote('${note.localId}')">删除暂存</button>`:`<button class="delete-btn" onclick="deleteNote(${Number(note.id)})">删除</button>`;return`<article class="note ${note.pending?'pending':''}"><div class="note-top"><div class="mood-tags">${moodTags}${note.pending?'<span class="mood-tag">本机暂存</span>':''}</div><span class="time">${formatTime(note.time)}</span></div><div class="meta">来自 ${escapeHtml(note.sender||'匿名')}</div><div class="note-text">${escapeHtml(note.text)}</div>${tagHtml}${reactionHtml}${deleteHtml}</article>`}).join('')}
function normalizeTagsForView(value){return String(value||'').split(',').map(tag=>tag.trim()).filter(Boolean)}
function deletePendingNote(localId){pendingNotes=pendingNotes.filter(note=>note.localId!==localId);savePendingNotes();renderHistory();renderCalendar();showToast('已删除暂存记录')}
function renderCalendar(){const year=calendarDate.getFullYear();const month=calendarDate.getMonth();$('calendarTitle').textContent=`${year}年${String(month+1).padStart(2,'0')}月`;const byDay={};allNotes().forEach(note=>{const day=localDayKey(note.time);if(!day)return;byDay[day]=byDay[day]||[];byDay[day].push(...String(note.mood||'').split('+').filter(Boolean))});const first=new Date(year,month,1);const days=new Date(year,month+1,0).getDate();const start=(first.getDay()+6)%7;let html='';for(let i=0;i<start;i++)html+='<div class="day blank"></div>';const todayKey=localDayKey(new Date().toISOString());let monthCount=0;for(let d=1;d<=days;d++){const key=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const moods=byDay[key]||[];if(moods.length)monthCount++;const icons=[...new Set(moods.map(name=>moodInfo(name).emoji))].slice(0,4).map(icon=>`<span>${icon}</span>`).join('');html+=`<div class="day ${key===todayKey?'today':''}"><span class="day-num">${d}</span><div class="day-moods">${icons}</div></div>`}$('calendarGrid').innerHTML=html;$('monthCount').textContent=monthCount;$('streakCount').textContent=countStreak(byDay)}
function toggleCalendar(){calendarOpen=!calendarOpen;$('checkinCard').classList.toggle('open',calendarOpen);$('calendarToggle').textContent=calendarOpen?'收起':'查看日历';if(calendarOpen)renderCalendar()}
function countStreak(byDay){let streak=0;const cursor=new Date();for(;;){const key=localDayKey(cursor.toISOString());if(!byDay[key])break;streak++;cursor.setDate(cursor.getDate()-1)}return streak}
moodGrid.addEventListener('click',event=>{const button=event.target.closest('.mood-btn');if(!button)return;const mood=button.dataset.mood;if(selectedMoods.includes(mood)){selectedMoods=selectedMoods.filter(item=>item!==mood);button.classList.remove('selected')}else{if(selectedMoods.length>=3){showToast('一次最多选择 3 种心情');return}selectedMoods.push(mood);button.classList.add('selected')}updateNotice();updateSelectedStrip()});
filters.addEventListener('click',event=>{const button=event.target.closest('.filter');if(!button)return;currentFilter=button.dataset.filter;renderFilters();renderHistory()});
$('prevMonth').addEventListener('click',()=>{calendarDate.setMonth(calendarDate.getMonth()-1);renderCalendar()});
$('nextMonth').addEventListener('click',()=>{calendarDate.setMonth(calendarDate.getMonth()+1);renderCalendar()});
$('calendarToggle').addEventListener('click',toggleCalendar);
noteText.addEventListener('input',()=>{counter.textContent=`${noteText.value.length}/500`});
$('passwordInput').addEventListener('keydown',event=>{if(event.key==='Enter')doLogin()});
window.addEventListener('load',()=>{setTimeout(()=>$('splash').classList.add('hide'),450)});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}))}
updateToday();loadPendingNotes();renderMoodButtons();renderFilters();renderCalendar();loadWeather();if(NEEDS_PASSWORD&&!authPassword){$('loginOverlay').classList.add('show');loadAnalysis()}else{fetchNotes()}
</script>
</body>
</html>
