function escapeHtml(value){const div=document.createElement('div');div.textContent=value||'';return div.innerHTML}
function moodInfo(name){return MOODS.find(m=>m.name===name)||{name,emoji:name}}
function shortMoodName(name){return name==='想一个人静静'?'想静静':name}
function moodDisplay(name){const info=moodInfo(name);return TEXT_MOODS.some(m=>m.name===name)?`${info.emoji} ${escapeHtml(name)}`:escapeHtml(name)}
function defaultReactions(){return Object.fromEntries(REACTIONS.map(reaction=>[reaction.name,0]))}
function noteReactions(note){return {...defaultReactions(),...(note.reactions||{})}}
function formatTime(iso){if(!iso)return'暂无';const date=new Date(iso);if(Number.isNaN(date.getTime()))return'刚刚';const now=new Date();const pad=n=>String(n).padStart(2,'0');const time=`${pad(date.getHours())}:${pad(date.getMinutes())}`;const sameDay=date.getFullYear()===now.getFullYear()&&date.getMonth()===now.getMonth()&&date.getDate()===now.getDate();if(sameDay)return`今天 ${time}`;return`${date.getMonth()+1}/${date.getDate()} ${time}`}
function renderMoodButtons(){moodGrid.innerHTML=MOODS.map(mood=>`<button class="mood-btn" type="button" data-mood="${mood.name}" title="${mood.name}" aria-label="${mood.name}">${mood.emoji}</button>`).join('')}
function renderFilters(){filters.innerHTML=[`<button class="filter ${currentFilter==='all'?'active':''}" data-filter="all">全部</button>`,...TEXT_MOODS.map(mood=>`<button class="filter ${currentFilter===mood.name?'active':''}" data-filter="${mood.name}">${mood.emoji} ${shortMoodName(mood.name)}</button>`)].join('')}
function renderThemes(){const current=localStorage.getItem('moodTheme')||'milk';document.documentElement.dataset.theme=current;$('themeSwitch').innerHTML=THEMES.map(item=>`<button class="theme-chip ${item.id===current?'active':''}" data-theme="${item.id}">${item.name}</button>`).join('')}
function updateToday(){const now=new Date();const pad=n=>String(n).padStart(2,'0');const week='日一二三四五六'[now.getDay()];$('todayDate').textContent=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}　周${week}`}
function updateNotice(){const reminders={'生气':'他今天可能需要你多一点耐心和温柔。','委屈':'他心里可能有一点小委屈，记得抱抱他。','难过':'他今天心情不太好，一句温暖的话会很有用。','需要安慰':'他正在认真发出需要被靠近的信号。','😞':'他今天可能有点低落，轻轻陪一下就很好。','😟':'他好像有点担心，记得告诉他你在。','😣':'他可能撑得有点辛苦，给他一点软软的安慰。','😖':'他今天可能不太舒服，别让他一个人扛。','☹️':'他看起来需要一点点阳光和抱抱。','😓':'他可能有点累了，陪他慢慢缓一缓。','😱':'他可能被吓到了，先让他安心下来。','😨':'他可能有些害怕，温柔地靠近他。','😰':'他可能很紧张，告诉他慢慢来就好。'};const message=selectedMoods.map(m=>reminders[m]).find(Boolean);if(!message){notice.classList.remove('show');return}noticeText.textContent=message;notice.classList.add('show')}
function clearForm(){selectedMoods=[];noteText.value='';tagsInput.value='';document.querySelectorAll('.mood-btn').forEach(btn=>btn.classList.remove('selected'));counter.textContent='0/500';updateNotice()}
async function loadWeather(query='city=厦门海沧'){try{const res=await fetch(`/api/weather?${query}`);const data=await res.json();$('weatherIcon').textContent=data.emoji||'🌤️';$('weatherCity').textContent=data.city||'厦门海沧';$('weatherTemp').textContent=data.temperature??'--';$('weatherText').textContent=data.weather||'暂不可用';$('weatherRange').textContent=(data.today_high!=null&&data.today_low!=null)?`明日 ${data.tomorrow} · ↑${data.today_high}° ↓${data.today_low}°`:'明日天气加载中';$('weatherHumidity').textContent=data.humidity!=null?`湿度 ${data.humidity}%`:'湿度 --';$('weatherWind').textContent=data.wind_level!=null?`东南风 ${data.wind_level}级`:'风力 --';$('weatherTip').textContent=data.reminder||'今天也要好好照顾自己。'}catch(error){$('weatherTip').textContent='天气暂时没有取到，出门前再看一眼窗外。'}}
function useCurrentLocation(){if(!navigator.geolocation){showToast('这个设备暂时不支持定位');return}showToast('正在请求定位...');navigator.geolocation.getCurrentPosition(pos=>{const {latitude,longitude}=pos.coords;loadWeather(`lat=${latitude}&lon=${longitude}`);showToast('已切换到当前位置天气')},()=>{showToast('定位被拒绝，继续显示厦门海沧');loadWeather()},{enableHighAccuracy:false,timeout:9000,maximumAge:900000})}
async function loadAnalysis(){if(NEEDS_PASSWORD&&!authPassword){$('analysisSummary').textContent='输入密码后显示智能分析';$('analysisSuggestion').textContent='小蜥蜴会根据你的最近记录生成提醒。';return}try{const res=await fetch('/api/analysis',{headers:headers()});const data=await res.json();if(!res.ok)throw new Error('analysis failed');$('analysisSummary').textContent=data.summary||'小蜥蜴看见了你最近的心情。';$('analysisSuggestion').textContent=data.suggestion||'先照顾好今天的自己。'}catch(error){$('analysisSummary').textContent='暂时没有取到分析';$('analysisSuggestion').textContent='记录功能仍然正常，稍后再刷新看看。'}}
async function fetchNotes(){loading.classList.add('show');try{const res=await fetch('/api/notes',{headers:headers()});if(!res.ok)throw new Error('load failed');const data=await res.json();notes=Array.isArray(data)?data:[];renderHistory();loadAnalysis()}catch(error){notes=[];renderHistory();showToast('加载失败，请稍后再试')}finally{loading.classList.remove('show')}}
async function refreshNotes(){await fetchNotes();showToast('已刷新')}
async function submitMood(){const text=noteText.value.trim();if(!selectedMoods.length)return showToast('请先选择心情');if(!text)return showToast('写几句话再发送吧');submitBtn.disabled=true;submitBtn.textContent='正在发送...';try{const res=await fetch('/api/notes',{method:'POST',headers:headers(),body:JSON.stringify({mood:selectedMoods.join(','),text,sender:senderInput.value.trim(),tags:tagsInput.value.trim()})});const payload=await res.json().catch(()=>({}));if(!res.ok){showToast(payload.error||'发送失败');return}showToast(res.status===202?'已临时保存，请检查存储配置':'小蜥蜴收到啦');clearForm();await fetchNotes()}catch(error){showToast('网络出错了')}finally{submitBtn.disabled=false;submitBtn.textContent='提交心情日记 ♡'}}
async function addReaction(id,reaction){reactingId=`${id}:${reaction}`;renderHistory();try{const res=await fetch(`/api/notes/${id}/reactions`,{method:'POST',headers:headers(),body:JSON.stringify({reaction})});const payload=await res.json().catch(()=>({}));if(!res.ok){showToast(payload.error||'回应失败');return}notes=notes.map(note=>note.id===id?payload.note:note);renderHistory();showToast('回应已送达')}catch(error){showToast('回应失败，请稍后再试')}finally{reactingId=null;renderHistory()}}
async function deleteNote(id){if(!confirm('确定删除这条记录吗？'))return;try{const res=await fetch(`/api/notes/${id}`,{method:'DELETE',headers:headers()});if(!res.ok)throw new Error('delete failed');notes=notes.filter(note=>note.id!==id);renderHistory();loadAnalysis();showToast('已删除')}catch(error){showToast('删除失败')}}
async function doLogin(){const password=$('passwordInput').value.trim();if(!password)return;try{const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});if(!res.ok){showToast('密码不正确');return}authPassword=password;$('loginOverlay').classList.remove('show');await fetchNotes()}catch(error){showToast('验证失败')}}
function renderHistory(){const filtered=currentFilter==='all'?notes:notes.filter(note=>String(note.mood||'').split('+').includes(currentFilter));$('totalCount').textContent=notes.length;$('latestTime').textContent=notes.length?formatTime(notes[0].time):'暂无';if(!filtered.length){historyList.innerHTML='<div class="empty">还没有记录，写下今天的心情吧。</div>';return}historyList.innerHTML=filtered.map(note=>{const moodTags=String(note.mood||'').split('+').filter(Boolean).map(name=>`<span class="mood-tag">${moodDisplay(name)}</span>`).join('');const tags=Array.isArray(note.tags)?note.tags:[];const tagHtml=tags.length?`<div class="tag-row">${tags.map(tag=>`<span class="tag">#${escapeHtml(tag)}</span>`).join('')}</div>`:'';const reactions=noteReactions(note);const reactionHtml=`<div class="reaction-row">${REACTIONS.map(item=>{const key=`${note.id}:${item.name}`;return`<button class="reaction-btn" onclick="addReaction(${Number(note.id)}, '${item.name}')" ${reactingId===key?'disabled':''}>${item.emoji} ${item.name} ${Number(reactions[item.name]||0)}</button>`}).join('')}</div>`;return`<article class="note"><div class="note-top"><div class="mood-tags">${moodTags}</div><span class="time">${formatTime(note.time)}</span></div><div class="meta">来自 ${escapeHtml(note.sender||'匿名')}</div><div class="note-text">${escapeHtml(note.text)}</div>${tagHtml}${reactionHtml}<button class="delete-btn" onclick="deleteNote(${Number(note.id)})">删除</button></article>`}).join('')}
moodGrid.addEventListener('click',event=>{const button=event.target.closest('.mood-btn');if(!button)return;const mood=button.dataset.mood;if(selectedMoods.includes(mood)){selectedMoods=selectedMoods.filter(item=>item!==mood);button.classList.remove('selected')}else{if(selectedMoods.length>=3){showToast('一次最多选择 3 种心情');return}selectedMoods.push(mood);button.classList.add('selected')}updateNotice()});
filters.addEventListener('click',event=>{const button=event.target.closest('.filter');if(!button)return;currentFilter=button.dataset.filter;renderFilters();renderHistory()});
$('themeSwitch').addEventListener('click',event=>{const button=event.target.closest('.theme-chip');if(!button)return;localStorage.setItem('moodTheme',button.dataset.theme);renderThemes()});
noteText.addEventListener('input',()=>{counter.textContent=`${noteText.value.length}/500`});
$('passwordInput').addEventListener('keydown',event=>{if(event.key==='Enter')doLogin()});
window.addEventListener('load',()=>{setTimeout(()=>$('splash').classList.add('hide'),500)});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}))}
updateToday();renderThemes();renderMoodButtons();renderFilters();loadWeather();if(NEEDS_PASSWORD){$('loginOverlay').classList.add('show');loadAnalysis()}else{fetchNotes()}
</script>
</body>
</html>
