    <linearGradient id="shine" x1="92" y1="18" x2="410" y2="492" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity="0.34"/>
      <stop offset="0.54" stop-color="#fff" stop-opacity="0"/>
      <stop offset="1" stop-color="#f3a7c3" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#fff4f8"/>
  <g clip-path="url(#round)">
